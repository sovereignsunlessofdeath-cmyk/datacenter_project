<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Submit Support Ticket</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgb(26, 26, 26) 0%, rgb(40, 40, 40) 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .header { 
            background: linear-gradient(135deg, rgb(231, 76, 60) 0%, rgb(192, 57, 43) 100%);
            color: white; 
            padding: 30px; 
            border-radius: 12px; 
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .nav { 
            background: white; 
            padding: 15px 20px; 
            border-radius: 12px; 
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .nav a { 
            text-decoration: none; 
            color: rgb(231, 76, 60); 
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .nav a:hover { 
            background: rgb(255, 245, 245);
            color: rgb(192, 57, 43);
        }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .card h2 { 
            color: rgb(231, 76, 60); 
            margin-bottom: 20px; 
            font-size: 22px;
            border-bottom: 3px solid rgb(231, 76, 60);
            padding-bottom: 10px;
        }
        .form-group { 
            margin-bottom: 20px;
        }
        label { 
            display: block;
            margin-bottom: 8px;
            color: rgb(44, 62, 80);
            font-weight: 600;
            font-size: 14px;
        }
        input, select, textarea { 
            width: 100%;
            padding: 12px;
            border: 2px solid rgb(220, 220, 220);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { 
            outline: none;
            border-color: rgb(231, 76, 60);
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
        }
        button { 
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, rgb(231, 76, 60) 0%, rgb(192, 57, 43) 100%);
            color: white; 
            border: none; 
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.3);
        }
        .user-info {
            background: rgb(245, 245, 245);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: rgb(100, 100, 100);
            font-size: 14px;
        }
        .logout-btn {
            background: rgb(200, 200, 200);
            color: rgb(80, 80, 80);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-block;
            margin-top: 20px;
        }
        .logout-btn:hover {
            background: rgb(180, 180, 180);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Submit Support Ticket</h1>
            <p>Report an issue and get help from IT team</p>
        </div>

        <div class="nav">
            <a href="/order">Order Food</a>
            <a href="/submit_support_ticket">Submit Ticket</a>
            <a href="/logout">Logout</a>
        </div>

        <div class="card">
            <div class="user-info">
                Logged in as: <strong>{{ username }}</strong>
            </div>

            <h2>New Support Ticket</h2>
            <form action="/submit_ticket" method="POST">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" value="{{ username }}" readonly>
                </div>

                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" name="department" placeholder="e.g. IT, Operations, Finance" required>
                </div>

                <div class="form-group">
                    <label for="category">Issue Category</label>
                    <select id="category" name="category" required>
                        <option value="">-- Select Category --</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}">{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Describe Your Issue</label>
                    <textarea id="description" name="description" placeholder="Provide details about your issue..." rows="5" required></textarea>
                </div>

                <button type="submit">Submit Ticket</button>
            </form>

            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>
</body>
</html>
