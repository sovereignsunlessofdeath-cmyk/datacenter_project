<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Order Your Food</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .top-nav {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .top-nav a {
            background: #667eea;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        .top-nav a:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        .user-info {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .container { max-width: 500px; width: 100%; }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .card h1 { 
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }
        .card .subtitle { 
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .date-info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }
        .form-group { 
            margin-bottom: 20px;
        }
        label { 
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 14px;
        }
        input, select { 
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }
        input:focus, select:focus { 
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button { 
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        .help-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="/order">🍽️ Order Food</a>
        <a href="/submit_support_ticket">🎟️ Submit Ticket</a>
        <a href="/logout">🚪 Logout</a>
    </div>

    <div class="user-info">
        Logged in as: <strong>{{ username }}</strong>
    </div>

    <div class="container">
        <div class="card">
            <h1>🍽️ Order Your Food</h1>
            <p class="subtitle">Pick what you want for tomorrow</p>
            
            <div class="date-info">
                📅 For: {{ tomorrow }}
            </div>

            <form action="/submit_order" method="POST">
                <div class="form-group">
                    <label for="name">Your Name *</label>
                    <input type="text" id="name" name="staff_name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="food">Choose Your Food *</label>
                    <select id="food" name="food_choice" required>
                        <option value="">-- Select a meal --</option>
                        {% for item in menu %}
                        <option value="{{ item }}">{{ item }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit">✓ Confirm Order</button>
            </form>

            <p class="help-text">
                Your order will be added to tomorrow's list.<br>
                You can change it anytime before tomorrow.
            </p>
        </div>
    </div>
</body>
</html>
